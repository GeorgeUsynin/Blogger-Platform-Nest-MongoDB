name: Run Tests

on:
    push:
        branches:
            - main
            - master
    pull_request:
    workflow_dispatch:

jobs:
    test:
        name: Test Suite
        runs-on: ubuntu-latest

        services:
            mongodb:
                image: mongo:7
                ports:
                    - 27017:27017
                options: >-
                    --health-cmd="mongosh --eval 'db.runCommand({ ping: 1 })'"
                    --health-interval=10s
                    --health-timeout=5s
                    --health-retries=10

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 9

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Run tests
              run: npm run test:e2e
